<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="json_converter.css">
    <title>Document</title>
</head>
<body>
    
    <div>
      <h1 >HTML Form to JSON</h1>
      <p>
        Convert user input into JSON format instantly.
      </p>
        
      <form id="dataForm">
        <label for="name">
          Name
        </label>

        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"/>

        <label
          for="email"
           >
          Email
        </label>

        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
         
        />


        <label
          for="message"
          style="display: block; margin-bottom: 8px; font-weight: bold"
        >
          Message
        </label>


        <textarea
          id="message"
          name="message"
          rows="5"
          placeholder="Write your message..."
          
        ></textarea>


        <button
          type="button"
          onclick="convertToJson()"
         
        >
          Convert to JSON
        </button>
      </form>

      <div
        id="jsonOutput"
        
      ></div>
    </div>
    <script>
    function convertToJson() {
      const form = document.getElementById("dataForm");
      const formData = {};

      for (const element of form.elements) { const { name, type, value, checked } = element;
            if (!name || ["button", "submit"].includes(type)) continue;
                switch (type) { case "checkbox": formData[name] = checked ? (value || true) : false;
                        break; 
                    case "radio": if (checked) formData[name] = value;
                        break; 
                default: formData[name] = value; } }

      const jsonData = JSON.stringify(formData, null, 2);
      const jsonOutput = document.getElementById("jsonOutput");
      
      // Safer: use textContent instead of innerHTML to prevent XSS
      jsonOutput.textContent = jsonData;
    }
  </script>
    </script>
  </body>
</html>
</html>
