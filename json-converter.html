<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="json_converter.css">
    <title>Document</title>
</head>
<body>
    
    <div>
      <h1 >HTML Form to JSON</h1>
      <p>
        Convert user input into JSON format instantly.
      </p>
        
      <form id="dataForm">
        <label for="name">
          Name
        </label>

        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"/>

        <label
          for="email"
           >
          Email
        </label>

        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
         
        />


        <label
          for="message"
          style="display: block; margin-bottom: 8px; font-weight: bold"
        >
          Message
        </label>


        <textarea
          id="message"
          name="message"
          rows="5"
          placeholder="Write your message..."
          
        ></textarea>


        <button
          type="button"
          onclick="convertToJson()"
         
        >
          Convert to JSON
        </button>
      </form>

      <div
        id="jsonOutput"
        
      ></div>
    </div>
    <script>
    function convertToJson() {
  const form = document.getElementById("dataForm");
  const formData = {};

  [...form.elements].forEach((element) => {
    const { name, type, value, checked, options } = element;

    if (!name || ["button", "submit", "reset"].includes(type)) return;

    switch (type) {
      case "checkbox":
        // Handle multiple checkboxes with same name
        if (form.querySelectorAll(`input[name="${name}"]`).length > 1) {
          if (!formData[name]) formData[name] = [];
          if (checked) formData[name].push(value);
        } else {
          formData[name] = checked;
        }
        break;

      case "radio":
        if (checked) {
          formData[name] = value;
        }
        break;

      case "select-multiple":
        formData[name] = [...options]
          .filter(option => option.selected)
          .map(option => option.value);
        break;

      case "number":
        formData[name] = value === "" ? null : Number(value);
        break;

      default:
        formData[name] = value.trim();
    }
  });

  document.getElementById("jsonOutput").textContent =
    JSON.stringify(formData, null, 2);
}
  </script>
    </script>
  </body>
</html>
</html>
